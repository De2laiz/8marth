<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финал🎵</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
}

audio{
width:100%;
margin-top:20px;
}

img{
width:100%;
border-radius:15px;
margin-top:20px;
}

a{
display:block;
margin-top:20px;
font-size:18px;
text-decoration:none;
color:#e91e63;
}

/* сердечки */

@keyframes heartFloat{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(-50%,-120px) scale(1.5);
opacity:0;
}
}

/* конфетти */

@keyframes confettiFall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>С 8 Марта, любовь моя❤️‍🔥</h1>

<img src="gif.gif">

<audio controls>
<source src="music.mp3" type="audio/mpeg">
</audio>

<a href="index.html">В начало🌹</a>

</div>

<script>

document.addEventListener("click", function(e){

let heart = document.createElement("div");
heart.innerHTML = "❤️";

heart.style.position = "fixed";
heart.style.left = e.clientX + "px";
heart.style.top = e.clientY + "px";
heart.style.fontSize = "30px";
heart.style.pointerEvents = "none";
heart.style.animation = "heartFloat 1s ease-out forwards";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

/* конфетти */

for(let i=0;i<80;i++){

let conf=document.createElement("div");

conf.innerHTML="✨";

conf.style.position="fixed";
conf.style.left=Math.random()*100+"vw";
conf.style.top="-10px";
conf.style.fontSize="20px";
conf.style.animation="confettiFall "+(3+Math.random()*3)+"s linear infinite";

document.body.appendChild(conf);

}

</script>

</body>
</html>
