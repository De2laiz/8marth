<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финал🎵</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
}

audio{
width:100%;
margin-top:20px;
}

img{
width:100%;
border-radius:15px;
margin-top:20px;
}

button{
width:100%;
margin-top:15px;
padding:18px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

a{
display:block;
margin-top:20px;
font-size:18px;
text-decoration:none;
color:#e91e63;
}

/* сердечки */

@keyframes heartFloat{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(-50%,-120px) scale(1.5);
opacity:0;
}
}

/* конфетти */

@keyframes confettiFall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* экран любви */

#loveScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,192,203,0.95);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:32px;
color:#e91e63;
opacity:0;
pointer-events:none;
transition:0.6s;
z-index:1000;
}

#loveScreen.show{
opacity:1;
pointer-events:auto;
}

.bigHeart{
position:fixed;
top:-40px;
font-size:40px;
animation:loveRain linear forwards;
}

@keyframes loveRain{
0%{transform:translateY(0);}
100%{transform:translateY(120vh);}
}

.next-btn{
width:auto;
padding:12px 22px;
font-size:16px;
border-radius:25px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>С 8 Марта, любовь моя ❤️‍🔥</h1>

<img src="gif.gif">

<audio id="music" controls>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button onclick="loveExplosion()">Нажми сюда ❤️</button>

<button class="next-btn" onclick="location.href="index.html">В начало 🌹</button>

</div>

<div id="loveScreen">
<div>Я тебя очень люблю ❤️</div>
<div style="font-size:18px;margin-top:10px;">С 8 марта 🌸</div>
</div>

<script>

/* авто запуск музыки после первого клика */

document.addEventListener("click", function(){
document.getElementById("music").play();
},{once:true});

/* сердечки при клике */

document.addEventListener("click", function(e){

let heart=document.createElement("div");
heart.innerHTML="❤️";

heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.fontSize="30px";
heart.style.pointerEvents="none";
heart.style.animation="heartFloat 1s ease-out forwards";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

/* конфетти */

for(let i=0;i<80;i++){

let conf=document.createElement("div");

conf.innerHTML="✨";

conf.style.position="fixed";
conf.style.left=Math.random()*100+"vw";
conf.style.top="-10px";
conf.style.fontSize="20px";
conf.style.animation="confettiFall "+(3+Math.random()*3)+"s linear infinite";

document.body.appendChild(conf);

}

/* взрыв любви */

function loveExplosion(){

document.getElementById("loveScreen").classList.add("show");

for(let i=0;i<120;i++){

let heart=document.createElement("div");

heart.className="bigHeart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

/* закрытие экрана любви */

document.getElementById("loveScreen").addEventListener("click", function(){
this.classList.remove("show");
});

</script>

</body>
</html>
