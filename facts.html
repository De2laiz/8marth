<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Факты ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
margin-bottom:20px;
}

button{
width:100%;
padding:18px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
cursor:pointer;
}

/* факт */

.fact{
max-height:0;
overflow:hidden;
opacity:0;
margin-top:0;
padding:0 15px;
background:#ffe4ec;
border-radius:15px;
font-size:17px;
transition:all 0.5s ease;
}

.fact.open{
max-height:200px;
opacity:1;
margin-top:10px;
padding:15px;
}

a{
display:block;
margin-top:20px;
font-size:18px;
text-decoration:none;
color:#e91e63;
}

/* сердечки */

@keyframes heartFloat{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(-50%,-120px) scale(1.5);
opacity:0;
}
}

.next-btn{
width:auto;
padding:12px 22px;
font-size:16px;
border-radius:25px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>6 фактов ❤️</h1>

<button onclick="toggle('f1')">Факт 1</button>
<div id="f1" class="fact">Тут напиши первый факт</div>

<button onclick="toggle('f2')">Факт 2</button>
<div id="f2" class="fact">Тут напиши второй факт</div>

<button onclick="toggle('f3')">Факт 3</button>
<div id="f3" class="fact">Тут напиши третий факт</div>

<button onclick="toggle('f4')">Факт 4</button>
<div id="f4" class="fact">Тут напиши четвертый факт</div>

<button onclick="toggle('f5')">Факт 5</button>
<div id="f5" class="fact">Тут напиши пятый факт</div>

<button onclick="toggle('f6')">Факт 6</button>
<div id="f6" class="fact">Тут напиши шестой факт</div>

<button class="next-btn" onclick="location.href='gallery.html'">Дальше 😘</button>

</div>

<script>

function toggle(id){
let el=document.getElementById(id);
el.classList.toggle("open");
}

/* сердечки при клике */

document.addEventListener("click", function(e){

let heart=document.createElement("div");
heart.innerHTML="❤️";

heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.fontSize="30px";
heart.style.pointerEvents="none";
heart.style.animation="heartFloat 1s ease-out forwards";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

</script>

</body>
</html>
