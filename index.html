<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 💐</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:white;
padding:30px 20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:500px;
width:90%;
}

h1{
color:#e91e63;
font-size:28px;
}

p{
font-size:18px;
color:#444;
}

button{
width:100%;
margin-top:15px;
padding:18px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

.hidden-message{
margin-top:20px;
font-size:18px;
color:#e91e63;
display:none;
}

/* цветочки */

.flower{
position:fixed;
font-size:22px;
animation:float linear infinite;
pointer-events:none;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* маленькие сердечки */

@keyframes heartFloat{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(-50%,-120px) scale(1.5);
opacity:0;
}
}

/* экран любви */

#loveScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,192,203,0.95);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:32px;
color:#e91e63;
opacity:0;
pointer-events:none;
transition:0.6s;
z-index:1000;
text-align:center;
padding:20px;
}

#loveScreen.show{
opacity:1;
pointer-events:auto;
}

/* падающие сердца */

.bigHeart{
position:fixed;
font-size:30px;
animation:loveRain 3s linear forwards;
}

@keyframes loveRain{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="card">

<h1>С 8 Марта 🌷</h1>

<p>
Спасибо что ты есть в моей жизни 🥰  
Ты — самое прекрасное, что есть в этом мире 💖
</p>

<button onclick="showMessage()">Нажми меня ✨</button>

<div class="hidden-message" id="secret">
Я тебя очень ценю и люблю ❤️‍🔥
</div>

<button onclick="loveExplosion()">Я тебя люблю ❤️</button>

<button onclick="location.href='facts.html'">Дальше →</button>

</div>


<div id="loveScreen">
<div>Я тебя очень люблю ❤️</div>
<div style="font-size:18px;margin-top:10px;">С 8 марта 🌸</div>
</div>


<script>

/* показать скрытый текст */

function showMessage(){
document.getElementById("secret").style.display="block";
}


/* цветочки */

for(let i=0;i<20;i++){

let flower=document.createElement("div");

flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(flower);

}


/* сердечки при нажатии */

document.addEventListener("click", function(e){

let heart = document.createElement("div");
heart.innerHTML = "❤️";

heart.style.position = "fixed";
heart.style.left = e.clientX + "px";
heart.style.top = e.clientY + "px";
heart.style.fontSize = "30px";
heart.style.pointerEvents = "none";
heart.style.animation = "heartFloat 1s ease-out forwards";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});


/* экран любви */

function loveExplosion(){

document.getElementById("loveScreen").classList.add("show");

for(let i=0;i<120;i++){

let heart=document.createElement("div");

heart.className="bigHeart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}


/* закрытие экрана */

document.getElementById("loveScreen").addEventListener("click", function(){
this.classList.remove("show");
});

</script>

</body>
</html>
