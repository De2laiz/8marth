<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 💐</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:white;
padding:30px 20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:500px;
width:90%;
}
  
h1{
color:#e91e63;
font-size:28px;
}

p{
font-size:18px;
color:#444;
}

button{
width:100%;
margin-top:15px;
padding:18px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

.hidden-message{
margin-top:20px;
font-size:18px;
color:#e91e63;
display:none;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* летающие цветочки */

.flower{
position:fixed;
font-size:22px;
animation:float linear infinite;
pointer-events:none;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div class="card">

<h1>С 8 Марта 🌷</h1>

<p>
Спасибо что ты есть в моей жизни🥰 Ты - самое прекрасное, что есть в этом мире 💖
</p>

<button onclick="showMessage()">Нажми меня ✨</button>

<div class="hidden-message" id="secret">
Я тебя очень ценю и люблю ❤️‍🔥
</div>

<button onclick="location.href='facts.html'">Дальше →</button>

</div>

<script>

function showMessage(){
document.getElementById("secret").style.display="block";
}

/* создаем цветочки */

for(let i=0;i<20;i++){

let flower=document.createElement("div");

flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(flower);

}

</script>

</body>
</html>
