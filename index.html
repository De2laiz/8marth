<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 💐</title>
<!-- Подключение внешнего CSS, если нужно -->
<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
    max-width: 400px;
}

h1 {
    color: #e91e63;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    color: #444;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #e91e63;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #c2185b;
    transform: scale(1.05);
}

.hidden-message {
    margin-top: 20px;
    font-size: 18px;
    color: #e91e63;
    display: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Летающие цветочки */
.flower {
    position: absolute;
    font-size: 24px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="card">
    <h1>С 8 Марта 🌷</h1>
    <p>Пусть этот день будет наполнен улыбками, теплом и счастьем!  
    Ты — самое прекрасное, что есть в этом мире 💖</p>
    
    <!-- Кнопка, которая показывает скрытое сообщение -->
    <button onclick="showMessage()">Нажми меня ✨</button>
    <div class="hidden-message" id="secret">
        Я тебя очень ценю и люблю ❤️
    </div>
    
    <!-- Кнопка перехода на вторую страницу -->
    <button onclick="location.href='facts.html'">Дальше 💖</button>
</div>

<script>
// Показ скрытого сообщения
function showMessage() {
    document.getElementById("secret").style.display = "block";
}

// создаём летающие цветы
for (let i = 0; i < 20; i++) {
    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(flower);
}
</script>

</body>
</html>
