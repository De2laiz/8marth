<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 💌</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="envelope" onclick="openLetter(this)">
    <div class="letter">
        <h1>С 8 Марта 🌷</h1>
        <p>
            Дорогая, ты делаешь этот мир светлее 💖<br><br>
            Пусть в твоей жизни будет<br>
            больше счастья, улыбок и любви ✨
        </p>
        <!-- Кнопка перехода на вторую страницу -->
        <button onclick="location.href='facts.html'">Дальше 💖</button>
    </div>
</div>

<audio id="music">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>
function openLetter(el) {
    el.classList.toggle("open");
    document.getElementById("music").play();
}

// создаём лепестки
for (let i = 0; i < 25; i++) {
    let petal = document.createElement("div");
    petal.className = "petal";
    petal.innerHTML = "🌸";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(petal);
}
</script>

</body>
</html>
